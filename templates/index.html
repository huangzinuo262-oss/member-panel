<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会员续费协作后台</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --blue: #38bdf8;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .page { max-width: 1520px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .stats { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    .stat { background: var(--card-2); border-radius: 14px; padding: 14px; }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    input, textarea, button {
      width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line);
      background: #0b1220; color: var(--text); font: inherit;
    }
    textarea { min-height: 84px; resize: vertical; }
    button { cursor: pointer; background: #1d4ed8; border-color: #2563eb; }
    button:hover { filter: brightness(1.08); }
    .btn-green { background: #166534; border-color: #22c55e; }
    .btn-orange { background: #92400e; border-color: #f59e0b; }
    .btn-slate { background: #334155; border-color: #475569; }
    .btn-red { background: #7f1d1d; border-color: #ef4444; }
    .muted { color: var(--muted); font-size: 12px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .searchbar { display:flex; gap:8px; flex-wrap:wrap; }
    .searchbar input { min-width: 280px; }
    .pill { display:inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .pill-danger { background: rgba(239,68,68,.16); color: #fca5a5; }
    .pill-warn { background: rgba(245,158,11,.16); color: #fcd34d; }
    .pill-info { background: rgba(56,189,248,.16); color: #7dd3fc; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; white-space: nowrap; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .renew-inline { display:flex; gap:8px; align-items:center; }
    .small { width: auto; display:inline-block; }
    .empty { color: var(--muted); padding: 12px 0; }
    .edit-form { display:none; margin-top:8px; padding:12px; background:#0b1220; border:1px solid var(--line); border-radius:12px; }
    .edit-form.show { display:block; }
    .edit-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:8px; }
    .hidden { display:none !important; }
    .auth-wrap { max-width: 420px; margin: 8vh auto; }
    .topbar-user { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .copy-btn { background: #0f766e; border-color: #14b8a6; }
    .hint-box { margin-top: 8px; color: var(--muted); font-size: 12px; }
    @media (max-width: 900px) {
      body { padding: 14px; }
      .row { grid-template-columns: 1fr; }
      .searchbar input { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loginView" class="auth-wrap hidden">
    <div class="card">
      <h1 style="margin-top:0;">会员续费协作后台</h1>
      <p class="muted">两个人一起用的轻量后台。先登录再操作。</p>
      <form method="post" action="/login">
        <p><input name="username" placeholder="用户名" required /></p>
        <p><input name="password" type="password" placeholder="密码" required /></p>
        <p><button class="btn-green" type="submit">登录</button></p>
      </form>
      <div class="muted">默认账号如果没改过：admin / admin123，partner / partner123</div>
    </div>
  </div>

  <div id="appView" class="page hidden">
    <div class="toolbar">
      <div>
        <h1 style="margin:0;">会员续费协作后台</h1>
        <div class="muted">支持双人协作、搜索、编辑、续费、操作记录。</div>
      </div>
      <div class="topbar-user">
        <div class="muted" id="currentUserText">加载中...</div>
        <a href="/logout"><button class="small btn-red" type="button">退出登录</button></a>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <h2>今日概览</h2>
      <div class="stats" id="stats"></div>
    </div>

    <div class="grid" style="margin-bottom:16px;">
      <div class="card">
        <h2>新增会员</h2>
        <form method="post" action="/members/add">
          <div class="row">
            <p><input name="name" placeholder="姓名/备注名" required /></p>
            <p><input name="qq" placeholder="QQ号" /></p>
          </div>
          <div class="row">
            <p><input name="group_name" placeholder="群名" /></p>
            <p><input name="join_date" type="date" required /></p>
          </div>
          <p><textarea name="notes" placeholder="备注"></textarea></p>
          <p><button class="btn-green" type="submit">添加会员</button></p>
        </form>
      </div>
      <div class="card">
        <h2>搜索</h2>
        <div class="searchbar">
          <input id="searchInput" placeholder="按姓名 / QQ / 群名 / 备注搜索" />
          <button id="searchBtn" class="small">搜索</button>
          <button id="resetBtn" class="small btn-slate">重置</button>
        </div>
        <div class="muted" style="margin-top:10px;">每个会员都能编辑：姓名、QQ号、群名、入群时间、到期时间、备注。</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="toolbar">
        <h2>今天要提醒的人</h2>
        <div class="muted">到期前 5 天自动进入提醒名单</div>
      </div>
      <div id="dueWrap"></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="toolbar">
        <h2>全部会员</h2>
        <div class="muted">支持编辑与续费</div>
      </div>
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>QQ</th>
              <th>群名</th>
              <th>入群时间</th>
              <th>到期时间</th>
              <th>剩余天数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="membersBody"></tbody>
        </table>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="toolbar">
          <h2>最近续费记录</h2>
          <div class="muted">最近 50 条</div>
        </div>
        <div id="renewalsWrap"></div>
      </div>
      <div class="card">
        <div class="toolbar">
          <h2>协作账号</h2>
          <div class="muted">当前已启用账号</div>
        </div>
        <div id="usersWrap"></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="toolbar">
        <h2>操作记录</h2>
        <div class="muted">谁改了什么，一目了然</div>
      </div>
      <div id="auditWrap"></div>
    </div>
  </div>

  <script>
    function escapeHtml(v) {
      return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }
    function pill(daysLeft) {
      if (daysLeft < 0) return `<span class="pill pill-danger">已过期 ${Math.abs(daysLeft)} 天</span>`;
      if (daysLeft === 0) return `<span class="pill pill-danger">今天到期</span>`;
      if (daysLeft <= 5) return `<span class="pill pill-warn">${daysLeft} 天内到期</span>`;
      return `<span class="pill pill-info">剩余 ${daysLeft} 天</span>`;
    }
    function calcDaysLeft(dateStr) {
      const today = new Date();
      const base = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const d = new Date(dateStr + 'T00:00:00');
      return Math.round((d - base) / 86400000);
    }
    function toggleEdit(id) {
      const el = document.getElementById(`edit-${id}`);
      if (el) el.classList.toggle('show');
    }
    window.toggleEdit = toggleEdit;

    function renderStats(summary) {
      const stats = [
        ['今天日期', summary.today],
        ['有效会员', summary.total_active],
        ['应提醒人数', summary.due_count],
        ['已过期人数', summary.expired_count],
        ['今天到期', summary.today_due_count],
        ['5天内到期', summary.upcoming_count],
      ];
      document.getElementById('stats').innerHTML = stats.map(([label, value]) => `
        <div class="stat"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div></div>
      `).join('');
    }

    function renderDue(rows) {
      if (!rows.length) {
        document.getElementById('dueWrap').innerHTML = '<div class="empty">当前没有需要提醒的人。</div>';
        return;
      }
      document.getElementById('dueWrap').innerHTML = `
        <div style="overflow:auto;"><table><thead><tr>
        <th>姓名</th><th>QQ</th><th>群名</th><th>入群时间</th><th>到期时间</th><th>状态</th><th>操作</th>
        </tr></thead><tbody>
        ${rows.map(row => `
          <tr>
            <td>${escapeHtml(row.name)}</td>
            <td>${escapeHtml(row.qq || '-')}</td>
            <td>${escapeHtml(row.group_name || '-')}</td>
            <td>${escapeHtml(row.join_date)}</td>
            <td>${escapeHtml(row.expire_date)}</td>
            <td>${pill(row.days_left)}</td>
            <td>
              <div class="actions">
                <form method="post" action="/members/renew"><input type="hidden" name="member_id" value="${row.id}"><input type="hidden" name="months" value="1"><button class="btn-orange small" type="submit">续费 1 个月</button></form>
                <button class="small copy-btn" type="button" onclick="copyReminder(${row.id}, '${escapeHtml(row.name)}', '${escapeHtml(row.qq || '')}', '${escapeHtml(row.expire_date)}')">复制提醒文案</button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody></table></div>`;
    }

    function buildReminderText(name, qq, expireDate) {
      const who = name || qq || '会员';
      return `${who} 你好，您会员到 ${expireDate} 就到期了，请及时续费，避免到期后影响使用。`;
    }

    async function copyReminder(id, name, qq, expireDate) {
      const text = buildReminderText(name, qq, expireDate);
      try {
        await navigator.clipboard.writeText(text);
        const el = document.getElementById(`copy-hint-${id}`);
        if (el) {
          el.textContent = '提醒文案已复制';
          setTimeout(() => { el.textContent = ''; }, 2000);
        }
      } catch (err) {
        alert('复制失败，请手动复制：\n\n' + text);
      }
    }
    window.copyReminder = copyReminder;

    function memberRow(row) {
      const daysLeft = calcDaysLeft(row.expire_date);
      return `
        <tr>
          <td>${row.id}</td>
          <td>
            <strong>${escapeHtml(row.name)}</strong>
            <div class="edit-form" id="edit-${row.id}">
              <form method="post" action="/members/update">
                <input type="hidden" name="member_id" value="${row.id}" />
                <div class="edit-grid">
                  <input name="name" value="${escapeHtml(row.name)}" placeholder="姓名" required />
                  <input name="qq" value="${escapeHtml(row.qq || '')}" placeholder="QQ号" />
                  <input name="group_name" value="${escapeHtml(row.group_name || '')}" placeholder="群名" />
                  <input name="join_date" type="date" value="${escapeHtml(row.join_date)}" required />
                  <input name="expire_date" type="date" value="${escapeHtml(row.expire_date)}" required />
                  <input name="active" value="${row.active}" placeholder="active: 1或0" />
                </div>
                <p><textarea name="notes" placeholder="备注">${escapeHtml(row.notes || '')}</textarea></p>
                <div class="actions">
                  <button class="small btn-green" type="submit">保存修改</button>
                  <button class="small btn-slate" type="button" onclick="toggleEdit(${row.id})">收起</button>
                </div>
              </form>
            </div>
          </td>
          <td>${escapeHtml(row.qq || '-')}</td>
          <td>${escapeHtml(row.group_name || '-')}</td>
          <td>${escapeHtml(row.join_date)}</td>
          <td>${escapeHtml(row.expire_date)}</td>
          <td>${pill(daysLeft)}</td>
          <td>
            <div class="actions">
              <form method="post" action="/members/renew"><input type="hidden" name="member_id" value="${row.id}"><input type="hidden" name="months" value="1"><button class="btn-orange small" type="submit">续费 1 个月</button></form>
              <button class="small copy-btn" type="button" onclick="copyReminder(${row.id}, '${escapeHtml(row.name)}', '${escapeHtml(row.qq || '')}', '${escapeHtml(row.expire_date)}')">复制提醒文案</button>
              <button class="small btn-slate" type="button" onclick="toggleEdit(${row.id})">编辑</button>
            </div>
            <div class="hint-box" id="copy-hint-${row.id}"></div>
          </td>
        </tr>`;
    }

    function renderMembers(rows) {
      document.getElementById('membersBody').innerHTML = rows.map(memberRow).join('');
    }

    function renderRenewals(rows) {
      if (!rows.length) {
        document.getElementById('renewalsWrap').innerHTML = '<div class="empty">还没有续费记录。</div>';
        return;
      }
      document.getElementById('renewalsWrap').innerHTML = `
        <div style="overflow:auto;"><table><thead><tr>
        <th>时间</th><th>姓名</th><th>QQ</th><th>续费前到期</th><th>续费后到期</th><th>操作人</th>
        </tr></thead><tbody>
        ${rows.map(row => `
          <tr>
            <td>${escapeHtml(row.created_at)}</td>
            <td>${escapeHtml(row.name)}</td>
            <td>${escapeHtml(row.qq || '-')}</td>
            <td>${escapeHtml(row.before_expire_date)}</td>
            <td>${escapeHtml(row.after_expire_date)}</td>
            <td>${escapeHtml(row.operator_display_name || row.operator_username || '-')}</td>
          </tr>`).join('')}
        </tbody></table></div>`;
    }

    function renderUsers(rows) {
      document.getElementById('usersWrap').innerHTML = `
        <div style="overflow:auto;"><table><thead><tr><th>ID</th><th>用户名</th><th>显示名</th><th>角色</th><th>状态</th></tr></thead><tbody>
        ${rows.map(row => `<tr><td>${row.id}</td><td>${escapeHtml(row.username)}</td><td>${escapeHtml(row.display_name)}</td><td>${escapeHtml(row.role)}</td><td>${row.active ? '启用' : '停用'}</td></tr>`).join('')}
        </tbody></table></div>`;
    }

    function renderAudit(rows) {
      if (!rows.length) {
        document.getElementById('auditWrap').innerHTML = '<div class="empty">还没有操作记录。</div>';
        return;
      }
      document.getElementById('auditWrap').innerHTML = `
        <div style="overflow:auto;"><table><thead><tr>
        <th>时间</th><th>操作人</th><th>动作</th><th>目标</th><th>详情</th>
        </tr></thead><tbody>
        ${rows.map(row => `
          <tr>
            <td>${escapeHtml(row.created_at)}</td>
            <td>${escapeHtml(row.display_name || row.username || '-')}</td>
            <td>${escapeHtml(row.action)}</td>
            <td>${escapeHtml(row.target_type)} #${escapeHtml(row.target_id || '')}</td>
            <td>${escapeHtml(row.details || '')}</td>
          </tr>`).join('')}
        </tbody></table></div>`;
    }

    async function checkAuthAndLoad(query='') {
      const meRes = await fetch('/api/me');
      if (meRes.status === 401) {
        document.getElementById('loginView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        return;
      }
      const me = await meRes.json();
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('currentUserText').textContent = `当前登录：${me.user.display_name} (${me.user.username})`;

      const url = query ? `/api/dashboard?q=${encodeURIComponent(query)}` : '/api/dashboard';
      const res = await fetch(url);
      const data = await res.json();
      renderStats(data.summary);
      renderDue(data.due || []);
      renderMembers(data.members || []);
      renderRenewals(data.renewals || []);
      renderUsers(data.users || []);
      renderAudit(data.audit_logs || []);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const searchBtn = document.getElementById('searchBtn');
      const resetBtn = document.getElementById('resetBtn');
      const searchInput = document.getElementById('searchInput');
      if (searchBtn) searchBtn.addEventListener('click', () => checkAuthAndLoad(searchInput.value.trim()));
      if (resetBtn) resetBtn.addEventListener('click', () => { searchInput.value=''; checkAuthAndLoad(''); });
      if (searchInput) searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); checkAuthAndLoad(searchInput.value.trim()); }
      });
      checkAuthAndLoad('');
    });
  </script>
</body>
</html>
